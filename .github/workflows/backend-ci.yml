name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/WeeklyPlanTracker.sln

      - name: Build
        run: dotnet build backend/WeeklyPlanTracker.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/WeeklyPlanTracker.sln --no-build --configuration Release --verbosity normal
