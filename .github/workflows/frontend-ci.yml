name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/weekly-plan-tracker-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/weekly-plan-tracker-web

      - name: Build
        run: npm run build -- --configuration production
        working-directory: frontend/weekly-plan-tracker-web
