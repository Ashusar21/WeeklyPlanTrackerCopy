<div class="page-container">
  <div class="setup-card card">
    <div class="setup-icon">📋</div>
    <h1 class="setup-title">Weekly Plan Tracker</h1>
    <p class="setup-subtitle">
      Let's get your team set up. Enter the first team member's name to begin.
    </p>

    <div class="form-group">
      <label>Your Name</label>
      <input
        type="text"
        [(ngModel)]="memberName"
        placeholder="e.g. Alice Chen"
        (keyup.enter)="create()"
        autofocus
      />
    </div>

    <button
      class="btn btn-primary w-full btn-lg"
      (click)="create()"
      [disabled]="!memberName.trim() || loading"
    >
      {{ loading ? "Setting up..." : "🚀 Create Team & Continue" }}
    </button>

    <p class="setup-note">
      The first person added becomes the team lead automatically.
    </p>
  </div>
</div>
