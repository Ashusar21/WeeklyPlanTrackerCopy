<div class="page-container">
  <button class="btn btn-ghost btn-sm mb-2" (click)="router.navigate(['/hub'])">
    ← Back to Hub
  </button>

  <div class="flex justify-between items-center mb-2">
    <h2 class="section-title" style="margin: 0">👥 Team Members</h2>
  </div>

  <!-- Add Member Form (Lead only) -->
  <div *ngIf="isLead" class="card mb-2">
    <p style="font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem">
      Add New Member
    </p>
    <div style="display: flex; gap: 0.5rem">
      <input
        type="text"
        [(ngModel)]="newName"
        placeholder="Member name..."
        (keyup.enter)="addMember()"
        style="flex: 1"
      />
      <button
        class="btn btn-primary"
        (click)="addMember()"
        [disabled]="!newName.trim() || adding"
      >
        {{ adding ? "Adding..." : "+ Add" }}
      </button>
    </div>
  </div>

  <!-- Members Table -->
  <div class="card">
    <div *ngIf="loading" class="empty-state"><p>Loading...</p></div>

    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Status</th>
          <th *ngIf="isLead">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let member of members">
          <!-- Name (editable) -->
          <td>
            <div
              *ngIf="editingId !== member.id"
              style="display: flex; align-items: center; gap: 0.5rem"
            >
              <div class="avatar">{{ member.name[0].toUpperCase() }}</div>
              {{ member.name }}
              <span
                *ngIf="isCurrentUser(member)"
                class="badge badge-lead"
                style="font-size: 0.65rem"
                >You</span
              >
            </div>
            <div
              *ngIf="editingId === member.id"
              style="display: flex; gap: 0.4rem"
            >
              <input
                type="text"
                [(ngModel)]="editName"
                (keyup.enter)="saveEdit(member)"
                style="flex: 1; padding: 0.3rem 0.5rem"
              />
              <button class="btn btn-primary btn-sm" (click)="saveEdit(member)">
                Save
              </button>
              <button class="btn btn-ghost btn-sm" (click)="cancelEdit()">
                Cancel
              </button>
            </div>
          </td>

          <!-- Role -->
          <td>
            <span
              class="badge"
              [class.badge-lead]="member.isLead"
              [class.badge-inactive]="!member.isLead"
            >
              {{ member.isLead ? "⭐ Lead" : "Member" }}
            </span>
          </td>

          <!-- Status -->
          <td>
            <span
              class="badge"
              [class.badge-success]="member.isActive"
              [class.badge-inactive]="!member.isActive"
            >
              {{ member.isActive ? "Active" : "Inactive" }}
            </span>
          </td>

          <!-- Actions (Lead only) -->
          <td *ngIf="isLead">
            <div style="display: flex; gap: 0.4rem; flex-wrap: wrap">
              <button
                class="btn btn-ghost btn-sm"
                (click)="startEdit(member)"
                *ngIf="editingId !== member.id"
              >
                ✏️ Edit
              </button>
              <button
                class="btn btn-ghost btn-sm"
                (click)="makeLead(member)"
                *ngIf="!member.isLead && member.isActive"
              >
                ⭐ Make Lead
              </button>
              <button
                class="btn btn-danger btn-sm"
                (click)="deactivate(member)"
                *ngIf="member.isActive && !isCurrentUser(member)"
              >
                Deactivate
              </button>
              <button
                class="btn btn-ghost btn-sm"
                (click)="reactivate(member)"
                *ngIf="!member.isActive"
              >
                Reactivate
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
