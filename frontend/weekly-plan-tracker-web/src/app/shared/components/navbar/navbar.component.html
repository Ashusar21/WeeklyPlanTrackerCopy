<nav class="navbar">
  <div class="navbar-brand">📋 Weekly Plan Tracker</div>

  @if (member()) {
    <div class="navbar-actions">
      <!-- Current member name (blurred for privacy in UI) -->
      <span class="member-name">{{ member()!.name }}</span>
      <!-- Role badge -->
      <span class="role-badge" [class.lead]="member()!.isLead">
        {{ member()!.isLead ? "Lead" : "Member" }}
      </span>
      <!-- Switch user -->
      <button class="nav-btn" (click)="switchUser()">🔄 Switch</button>
      <!-- Home -->
      <button class="nav-btn" (click)="goHome()">🏠 Home</button>
      <!-- Theme toggle -->
      <button class="nav-btn" (click)="toggleTheme()">
        {{ isDark() ? "☀️ Light" : "🌙 Dark" }}
      </button>
    </div>
  }

  @if (!member()) {
    <div class="navbar-actions">
      <button class="nav-btn" (click)="toggleTheme()">
        {{ isDark() ? "☀️ Light" : "🌙 Dark" }}
      </button>
    </div>
  }
</nav>
